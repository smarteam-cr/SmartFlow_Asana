services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: asana_hubspot
      PORT: 3000
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js

volumes:
  mongo_data:
